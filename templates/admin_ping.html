{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card" style="background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);">
                <div class="card-header" style="border-bottom:1px solid rgba(0,255,65,0.2);">
                    <h3 class="mb-0" style="color:#00ff41;">
                        <i class="fas fa-network-wired me-2"></i>Server Health Check
                    </h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('admin_ping') }}" method="POST" class="mb-4">
                        <div class="input-group">
                            <span class="input-group-text bg-dark text-success border-secondary">$</span>
                            <input type="text" name="host" class="form-control bg-dark text-light border-secondary font-monospace" 
                                   placeholder="Enter hostname (e.g., 127.0.0.1)" required>
                            <button type="submit" class="btn btn-outline-success">
                                <i class="fas fa-play me-1"></i>Ping
                            </button>
                        </div>
                    </form>

                    {% if result is not none %}
                    <div class="mt-3">
                        <h5 style="color:#00d4ff;"><i class="fas fa-terminal me-2"></i>Output:</h5>
                        <pre class="p-3 rounded" style="background:#000;color:#00ff41;border:1px solid rgba(0,255,65,0.3);max-height:400px;overflow-y:auto;font-size:0.85rem;">{{ result }}</pre>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
