{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card" style="background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4" style="color:#00ff41;">
                        <i class="fas fa-key me-2"></i>Reset Password
                    </h3>
                    <form action="{{ url_for('reset_password', token=token) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted">New Password</label>
                            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <button type="submit" class="btn btn-outline-success w-100">
                            <i class="fas fa-save me-1"></i>Reset Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
