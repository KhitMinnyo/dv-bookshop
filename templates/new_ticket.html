{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card" style="background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);">
                <div class="card-header" style="border-bottom:1px solid rgba(0,255,65,0.2);">
                    <h3 class="mb-0" style="color:#00ff41;">
                        <i class="fas fa-plus-circle me-2"></i>New Support Ticket
                    </h3>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('new_ticket') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted">Subject</label>
                            <input type="text" name="subject" class="form-control bg-dark text-light border-secondary" 
                                   placeholder="Brief description of your issue" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Message</label>
                            <textarea name="message" rows="6" class="form-control bg-dark text-light border-secondary" 
                                      placeholder="Describe your issue in detail..." required></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-outline-success flex-fill">
                                <i class="fas fa-paper-plane me-1"></i>Submit Ticket
                            </button>
                            <a href="{{ url_for('support_tickets') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
