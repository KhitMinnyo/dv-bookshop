{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card" style="background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);">
                <div class="card-header" style="border-bottom:1px solid rgba(0,255,65,0.2);">
                    <h3 class="mb-0" style="color:#00ff41;">
                        <i class="fas fa-exchange-alt me-2"></i>Transfer Balance
                    </h3>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4 p-3 rounded" style="background:rgba(0,255,65,0.1);border:1px solid rgba(0,255,65,0.3);">
                        <small class="text-muted d-block">Your Balance</small>
                        <span class="fs-2 fw-bold" style="color:#00ff41;">${{ "%.2f"|format(user['balance']) }}</span>
                    </div>
                    <form action="{{ url_for('transfer_balance') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted">Recipient Username</label>
                            <input type="text" name="recipient" class="form-control bg-dark text-light border-secondary" 
                                   placeholder="Enter recipient's username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Amount ($)</label>
                            <input type="number" name="amount" step="0.01" min="0.01" 
                                   class="form-control bg-dark text-light border-secondary" 
                                   placeholder="0.00" required>
                        </div>
                        <button type="submit" class="btn btn-outline-success w-100 btn-lg">
                            <i class="fas fa-paper-plane me-1"></i>Send Transfer
                        </button>
                    </form>
                    <div class="mt-3 p-2 rounded" style="background:rgba(255,0,85,0.05);border:1px solid rgba(255,0,85,0.2);">
                        <small style="color:#ff0055;"><i class="fas fa-exclamation-triangle me-1"></i>Transfers are irreversible.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
