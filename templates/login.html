{% extends 'base.html' %}

{% block title %}Login — Khit's Bookshop{% endblock %}

{% block content %}
<div class="login-page">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="login-card cyber-card animate-in">
                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="login-icon">
                        <i class="fas fa-user-lock"></i>
                    </div>
                    <h2 class="login-title">Access Terminal</h2>
                    <p class="login-subtitle">Enter your credentials to continue</p>
                </div>

                <!-- Login Form -->
                <form action="/login" method="POST">
                    <!-- L1: Open redirect via hidden 'next' parameter -->
                    <input type="hidden" name="next" value="{{ request.args.get('next', '/') }}">

                    <div class="mb-3">
                        <label for="username" class="form-label-cyber">
                            <i class="fas fa-user me-1"></i> Username
                        </label>
                        <input type="text" name="username" id="username"
                               class="form-control form-control-cyber"
                               placeholder="Enter username" required autocomplete="username">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label-cyber">
                            <i class="fas fa-lock me-1"></i> Password
                        </label>
                        <div class="password-wrapper">
                            <input type="password" name="password" id="password"
                                   class="form-control form-control-cyber"
                                   placeholder="Enter password" required autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-cyber-filled w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                </form>

                <hr class="divider">

                <!-- Links -->
                <div class="text-center">
                    <p class="auth-link">
                        <a href="/forgot_password" class="text-muted">
                            <i class="fas fa-key me-1"></i> Forgot Password?
                        </a>
                    </p>
                    <p class="auth-link mb-0">
                        Don't have an account?
                        <a href="/register" class="text-cyan">
                            <i class="fas fa-user-plus me-1"></i> Register
                        </a>
                    </p>
                </div>
            </div>

            <!-- Terminal decoration -->
            <div class="terminal-decor animate-in animate-delay-2">
                <span class="terminal-line">> authenticating user...</span>
                <span class="terminal-line blink">_</span>
            </div>
        </div>
    </div>
</div>

<style>
    .login-page {
        padding-top: 3rem;
        padding-bottom: 3rem;
    }

    .login-card {
        padding: 2.5rem;
    }

    .login-icon {
        font-size: 2.5rem;
        color: var(--green-primary);
        margin-bottom: 1rem;
        text-shadow: 0 0 20px var(--green-glow), 0 0 40px rgba(0, 255, 65, 0.2);
        animation: pulse-glow 2s ease-in-out infinite;
    }

    .login-title {
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 1.6rem;
        color: var(--text-primary);
    }

    .login-subtitle {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
    }

    .password-wrapper {
        position: relative;
    }

    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        transition: color 0.2s ease;
        padding: 0;
    }

    .password-toggle:hover {
        color: var(--green-primary);
    }

    .auth-link {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
    }

    .auth-link a {
        text-decoration: none;
        transition: all 0.2s ease;
    }

    .auth-link a:hover {
        text-shadow: 0 0 8px currentColor;
    }

    /* Terminal decoration */
    .terminal-decor {
        text-align: center;
        margin-top: 1.5rem;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .terminal-line {
        display: inline;
    }

    .blink {
        animation: blink-cursor 1s step-end infinite;
        color: var(--green-primary);
    }

    @keyframes blink-cursor {
        50% { opacity: 0; }
    }
</style>

<script>
function togglePassword() {
    var pw = document.getElementById('password');
    var icon = document.getElementById('toggleIcon');
    if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
