{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4 px-4">
    <h2 class="neon-green mb-4"><i class="fas fa-clipboard-list me-2"></i>Admin Activity Logs</h2>

    <div class="card" style="background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);">
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr style="border-bottom:1px solid rgba(0,255,65,0.2);">
                        <th style="color:#00ff41;">ID</th>
                        <th style="color:#00ff41;">Admin</th>
                        <th style="color:#00ff41;">Action</th>
                        <th style="color:#00ff41;">Details</th>
                        <th style="color:#00ff41;">Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr style="border-bottom:1px solid rgba(0,255,65,0.1);">
                        <td>{{ log['id'] }}</td>
                        <td style="color:#00d4ff;">{{ log['admin_username'] }}</td>
                        <td><span class="badge bg-secondary">{{ log['action'] }}</span></td>
                        <td class="text-muted">{{ log['details'] }}</td>
                        <td>{{ log['created_at'] }}</td>
                    </tr>
                    {% endfor %}
                    {% if not logs %}
                    <tr><td colspan="5" class="text-center text-muted py-3">No logs yet</td></tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
