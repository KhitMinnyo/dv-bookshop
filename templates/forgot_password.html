{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card" style="background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4" style="color:#00ff41;">
                        <i class="fas fa-unlock-alt me-2"></i>Forgot Password
                    </h3>
                    <p class="text-muted text-center mb-4">Enter your username to receive a password reset link.</p>
                    <form action="{{ url_for('forgot_password') }}" method="POST">
                        <div class="mb-4">
                            <label class="form-label text-muted">Username</label>
                            <input type="text" name="username" class="form-control bg-dark text-light border-secondary" 
                                   placeholder="Enter your username" required>
                        </div>
                        <button type="submit" class="btn btn-outline-success w-100 mb-3">
                            <i class="fas fa-paper-plane me-1"></i>Send Reset Link
                        </button>
                    </form>
                    <div class="text-center">
                        <a href="{{ url_for('login') }}" style="color:#00d4ff;">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
